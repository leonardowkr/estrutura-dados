<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=call" />
</head>
<body>
    <div id="tela">
        <form>
            <fieldset>
                <legend>Contato</legend>
                <div class="campo">
                    <label for="name">Nome
                    <input type="text" id="name" placeholder="Seu nome completo"></label>
                </div>
                <label for="phone">Celular
                <input type="number" id="phone" placeholder="(99) 99999-9999"></label>
                <label for="email">E-mail
                <input type="email" id="email" placeholder="nome@email.com"></label>
                <button type="submit">Salvar    </button>
            </fieldset>
        </form>
        <div id="lista">
            
        </div>
    </div>      
</body>
<script>
    document.querySelector('form').addEventListener('submit', (evento) => {
  evento.preventDefault(); // impede a página de recarregar

  fetch('http://localhost:8080/contatos', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ nome: document.getElementById('name').value, telefone: document.getElementById('phone').value, email: document.getElementById('email').value })
  });
});
    function carregaContato(){
        fetch('http://localhost:8080/contatos')
            .then(res => res.json())
            .then(dados => {
                const lista = document.getElementById('lista');
                lista.innerHTML = '';
                dados.forEach(contato => {
                    lista.innerHTML += `
                        <div class="contato">
                            <div class="alinhado">
                                <p class="nome" onclick = "mostrarContato(this)">${contato.nome}
                                    <span class="material-symbols-outlined">call</span>
                                </p>
                            </div>
                            <div class= "dados">
                                <p class="telefone">Celular: ${contato.telefone}</p>
                                <p class="email">E-mail: ${contato.email}</p>
                            </div>
                        </div>
`
                });
            })
    }
    function mostrarContato(elemento){
        console.log('teste');
        const contato = elemento.parentElement.parentElement;
        const telefone = contato.querySelector('.telefone');
        const email = contato.querySelector('.email');
        contato.querySelector('.telefone').classList.toggle('visivel');
        contato.querySelector('.email').classList.toggle('visivel');
        
    }
    carregaContato();
</script>
</html>
